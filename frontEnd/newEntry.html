<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>New Entry</title>
  <link rel="stylesheet" href="newEntry.css" />
</head>

<body>
  <main class="new-entry-page">

    <header class="page-header">
      <h1>New Entry</h1>
    </header>

    <form id="entry-form" class="entry-form">

      <!-- Title -->
      <div class="form-group">
        <label for="entry-title">Title</label>
        <input 
          type="text" 
          id="entry-title" 
          placeholder="Entry title..." 
          required
        />
      </div>

      <!-- Category -->
      <div class="form-group">
        <label for="entry-category">Category</label>
        <select id="entry-category" required>
             <option value="">Select Category</option>
             <option value="work">Work</option>
             <option value="personal">Personal</option>
             <option value="health">Health</option>
             <option value="travel">Travel</option>
            <option value="other">Other</option>
        </select>
      </div>

      <!-- Date & Time -->
      <div class="form-group">
        <label for="entry-datetime">Date & time</label>
        <input 
          type="datetime-local" 
          id="entry-datetime" 
          required
        />
      </div>

      <!-- Entry Text -->
      <div class="form-group">
        <label for="entry-text">Entry</label>
        <textarea 
          id="entry-text" 
          placeholder="Dear Diary ...." 
          rows="8" 
          required
        ></textarea>
      </div>

      <!-- Buttons -->
      <div class="form-actions">
<button class="btn btn-primary" onclick="window.location.href='index.html'"> Cancel </button>  
        <button type="submit" class="btn btn-primary"> Save </button>
      </div>

    </form>

  </main>

  <script src="app.js"></script>
</body>
</html>
